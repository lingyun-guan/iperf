name: Build iPerf3 for Android (arm64)

on:
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install Android NDK
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk wget unzip
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip -O /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /opt
          echo "/opt/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH
          echo "ANDROID_NDK_HOME=/opt/android-ndk-r26d" >> $GITHUB_ENV
        
      - name: Configure build environment
        run: |
          export ANDROID_NDK_HOME=/opt/android-ndk-r26d
          export PATH=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
          export CC=aarch64-linux-android21-clang
          export CXX=aarch64-linux-android21-clang++
          export AR=llvm-ar
          export RANLIB=llvm-ranlib
          export STRIP=llvm-strip
          export CFLAGS="-target aarch64-linux-android21 -Os -fomit-frame-pointer"
          export CXXFLAGS="-target aarch64-linux-android21 -Os -fomit-frame-pointer"
          export LDFLAGS="-target aarch64-linux-android21 -static"
          
          ./configure --host=aarch64-linux-android --enable-static --disable-shared
          
      - name: Build iPerf3
        run: |
          export PATH=/opt/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
          make -j$(nproc)
          
      - name: Verify binary
        run: |
          file src/iperf3
          ls -la src/iperf3
          # Check if statically linked
          ldd src/iperf3 2>&1 || echo "Binary is statically linked"
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iperf3-arm64-static
          path: src/iperf3
